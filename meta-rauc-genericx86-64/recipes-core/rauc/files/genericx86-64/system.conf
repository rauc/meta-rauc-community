[system]
compatible=genericx86-64
bootloader=grub
grubenv=/grubenv/grubenv
data-directory=/data/rauc

[keyring]
path=/etc/rauc/ca.cert.pem

[slot.efi.0]
device=/dev/sda
type=boot-gpt-switch
region-start=4M
region-size=100M

[slot.rootfs.0]
device=/dev/sda3
type=ext4
bootname=A

[slot.rootfs.1]
device=/dev/sda4
type=ext4
bootname=B
